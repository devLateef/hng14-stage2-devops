name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:

# =========================
# LINT STAGE
# =========================
jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Python Lint
        run: flake8 api worker

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: JS Lint
        working-directory: frontend
        run: npx eslint .

      - name: Hadolint API
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./api/Dockerfile

      - name: Hadolint Frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./frontend/Dockerfile

      - name: Hadolint Worker
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./worker/Dockerfile


# =========================
# TEST STAGE
# =========================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: api
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: api
        run: pytest --cov=. --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml


# =========================
# BUILD STAGE
# =========================
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    env:
      REGISTRY: localhost:5000

    steps:
      - uses: actions/checkout@v4

      - name: Wait for registry
        run: |
          echo "Waiting for registry..."

          for i in {1..15}; do
            if curl -fs http://localhost:5000/v2/; then
              echo "Registry ready"
              exit 0
            fi
            echo "Attempt $i..."
            sleep 2
          done

          echo "Registry failed"
          exit 1

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push API
        run: |
          docker build -t $REGISTRY/api:${{ github.sha }} ./api
          docker push $REGISTRY/api:${{ github.sha }}

      - name: Build & Push Frontend
        run: |
          docker build -t $REGISTRY/frontend:${{ github.sha }} ./frontend
          docker push $REGISTRY/frontend:${{ github.sha }}

      - name: Build & Push Worker
        run: |
          docker build -t $REGISTRY/worker:${{ github.sha }} ./worker
          docker push $REGISTRY/worker:${{ github.sha }}


# =========================
# SECURITY STAGE
# =========================
  security:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Pull images from registry (FIX)
        run: |
          docker pull localhost:5000/api:${{ github.sha }}
          docker pull localhost:5000/frontend:${{ github.sha }}
          docker pull localhost:5000/worker:${{ github.sha }}

      - name: Scan API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:${{ github.sha }}
          format: sarif
          output: api.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/frontend:${{ github.sha }}
          format: sarif
          output: frontend.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Scan Worker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/worker:${{ github.sha }}
          format: sarif
          output: worker.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: api.sarif


# =========================
# INTEGRATION STAGE
# =========================
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..30}; do
            curl -fs http://localhost:8000/health && exit 0
            sleep 2
          done
          exit 1

      - name: Submit job
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll job
        run: |
          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r .status)
            echo $STATUS
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Shutdown
        if: always()
        run: docker compose down


# =========================
# DEPLOY STAGE
# =========================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Rolling deploy
        run: |
          docker compose up -d --build

          for i in {1..10}; do
            if curl -fs http://localhost:8000/health; then
              echo "Healthy"
              exit 0
            fi
            sleep 3
          done

          echo "Deploy failed"
          exit 1