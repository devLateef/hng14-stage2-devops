name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:

# -------------------------
# LINT STAGE
# -------------------------
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python lint
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Python Lint
        run: flake8 api worker

      # JS lint
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: JS Lint
        working-directory: frontend
        run: npx eslint .

      # Docker lint
      - name: Hadolint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Hadolint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Hadolint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile


# -------------------------
# TEST STAGE
# -------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: api
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        working-directory: api
        run: pytest --cov=. --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml


# -------------------------
# BUILD + SECURITY SCAN
# -------------------------
  build_and_scan:
    name: Build and Security Scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Build images locally (NO registry)
      - name: Build API image
        run: docker build -t api:${{ github.sha }} ./api

      - name: Build Frontend image
        run: docker build -t frontend:${{ github.sha }} ./frontend

      - name: Build Worker image
        run: docker build -t worker:${{ github.sha }} ./worker

      # Security scan (LOCAL IMAGES ONLY)
      # exit-code: 0 so pipeline continues even if vulnerabilities are found.
      # Results are uploaded to GitHub Security tab for review.
      - name: Scan API
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: api:${{ github.sha }}
          format: sarif
          output: api.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Scan Frontend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: frontend:${{ github.sha }}
          format: sarif
          output: frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Scan Worker
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: worker:${{ github.sha }}
          format: sarif
          output: worker.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload API SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: api.sarif
          category: trivy-api

      - name: Upload Frontend SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: frontend.sarif
          category: trivy-frontend

      - name: Upload Worker SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: worker.sarif
          category: trivy-worker


# -------------------------
# INTEGRATION TEST
# -------------------------
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build_and_scan

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:8000/health && exit 0
            sleep 2
          done
          exit 1

      - name: Submit job
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll job
        run: |
          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r .status)
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Shutdown stack
        if: always()
        run: docker compose down


# -------------------------
# DEPLOY (MAIN ONLY)
# -------------------------
  deploy:
    name: Deploy (main only)
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Rolling deployment
        run: |
          docker compose up -d --build

          for i in {1..10}; do
            if curl -sf http://localhost:8000/health; then
              echo "Deployment healthy"
              exit 0
            fi
            sleep 3
          done

          echo "Deployment failed"
          exit 1