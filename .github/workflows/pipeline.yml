name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python lint tools
        run: pip install flake8

      - name: Python Lint
        run: flake8 api worker

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: JS Lint
        working-directory: frontend
        run: npx eslint .

      - name: Docker lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "**/Dockerfile"


  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: api
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        working-directory: api
        run: pytest --cov=. --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml


  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API
        run: docker build -t localhost:5000/api:${{ github.sha }} ./api

      - name: Build Frontend
        run: docker build -t localhost:5000/frontend:${{ github.sha }} ./frontend

      - name: Build Worker
        run: docker build -t localhost:5000/worker:${{ github.sha }} ./worker

      - name: Push images
        run: |
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/worker:${{ github.sha }}


  security:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Scan API
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: localhost:5000/api:${{ github.sha }}
          format: sarif
          output: api.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Scan Frontend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: localhost:5000/frontend:${{ github.sha }}
          format: sarif
          output: frontend.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Scan Worker
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: localhost:5000/worker:${{ github.sha }}
          format: sarif
          output: worker.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: api.sarif


  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            curl -f http://localhost:8000/health && exit 0
            sleep 2
          done
          exit 1

      - name: Submit job
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll job
        run: |
          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r .status)
            echo $STATUS
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Shutdown
        if: always()
        run: docker compose down


  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Rolling deploy
        run: |
          docker compose up -d --build
          for i in {1..10}; do
            curl -f http://localhost:8000/health && exit 0
            sleep 3
          done
          exit 1