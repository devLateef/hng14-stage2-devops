name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:

# -------------------------
# LINT
# -------------------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install flake8

      - run: flake8 api worker

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - working-directory: frontend
        run: npm ci

      - working-directory: frontend
        run: npx eslint .

      - name: Hadolint API
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Hadolint Frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Hadolint Worker
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile


# -------------------------
# TEST
# -------------------------
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - working-directory: api
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - working-directory: api
        run: pytest --cov=. --cov-report=xml

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: api/coverage.xml


# -------------------------
# BUILD + LOCAL REGISTRY
# -------------------------
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Wait for registry
        run: |
          echo "Waiting for registry..."
          for i in {1..20}; do
            if curl -fs http://localhost:5000/v2/; then
              echo "Registry ready"
              exit 0
            fi
            sleep 2
          done
          echo "Registry failed"
          exit 1

      - name: Build API
        run: docker build -t localhost:5000/api:${{ github.sha }} ./api

      - name: Build Frontend
        run: docker build -t localhost:5000/frontend:${{ github.sha }} ./frontend

      - name: Build Worker
        run: docker build -t localhost:5000/worker:${{ github.sha }} ./worker

      - name: Push images
        run: |
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/worker:${{ github.sha }}


# -------------------------
# SECURITY SCAN (FIXED)
# -------------------------
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Pull images (IMPORTANT FIX)
        run: |
          docker pull localhost:5000/api:${{ github.sha }}
          docker pull localhost:5000/frontend:${{ github.sha }}
          docker pull localhost:5000/worker:${{ github.sha }}

      - name: Scan API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:${{ github.sha }}
          format: sarif
          output: api.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: api.sarif


# -------------------------
# INTEGRATION
# -------------------------
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get install -y jq

      - run: docker compose up -d --build

      - run: |
          for i in {1..30}; do
            curl -fs http://localhost:8000/health && exit 0
            sleep 2
          done
          exit 1

      - run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - run: |
          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r .status)
            if [ "$STATUS" = "completed" ]; then exit 0; fi
            sleep 2
          done
          exit 1

      - if: always()
        run: docker compose down


# -------------------------
# DEPLOY
# -------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - run: docker compose up -d --build

      - run: |
          for i in {1..10}; do
            curl -fs http://localhost:8000/health && exit 0
            sleep 3
          done
          exit 1