name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:

# -------------------------
# LINT STAGE
# -------------------------
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Python Lint
        run: flake8 api worker

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: JS Lint
        working-directory: frontend
        run: npx eslint .

      - name: Hadolint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Hadolint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Hadolint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile


# -------------------------
# TEST STAGE
# -------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: api
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        working-directory: api
        run: pytest tests/ --cov=. --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml


# -------------------------
# BUILD + SECURITY SCAN
# -------------------------
  build_and_scan:
    name: Build and Security Scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write
      contents: read

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

      - name: Scan API image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: localhost:5000/api:${{ github.sha }}
          format: sarif
          output: ${{ github.workspace }}/api.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true

      - name: Scan Frontend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: localhost:5000/frontend:${{ github.sha }}
          format: sarif
          output: ${{ github.workspace }}/frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: localhost:5000/worker:${{ github.sha }}
          format: sarif
          output: ${{ github.workspace }}/worker.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true

      - name: Upload API SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ${{ github.workspace }}/api.sarif
          category: trivy-api

      - name: Upload Frontend SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ${{ github.workspace }}/frontend.sarif
          category: trivy-frontend

      - name: Upload Worker SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ${{ github.workspace }}/worker.sarif
          category: trivy-worker


# -------------------------
# INTEGRATION TEST
# -------------------------
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build_and_scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:8000/health && exit 0
            sleep 2
          done
          exit 1

      - name: Run integration tests
        run: |
          chmod +x tests/integration.sh
          TIMEOUT=60 API_URL=http://localhost:8000 bash tests/integration.sh

      - name: Submit job
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll job
        run: |
          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r .status)
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Shutdown stack
        if: always()
        run: docker compose down


# -------------------------
# DEPLOY (MAIN ONLY)
# -------------------------
  deploy:
    name: Deploy (main only)
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure registry credentials
        if: env.REGISTRY_PASSWORD != ''
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
        run: |
          echo "$REGISTRY_PASSWORD" | docker login \
            "$REGISTRY_URL" \
            -u "$REGISTRY_USERNAME" \
            --password-stdin

      - name: Rolling deployment
        run: |
          docker compose up -d --build

          for i in {1..10}; do
            if curl -sf http://localhost:8000/health; then
              echo "Deployment healthy"
              exit 0
            fi
            sleep 3
          done

          echo "Deployment failed"
          exit 1
